<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>

  <!-- Globe -->
  <circle cx="100" cy="100" r="55" fill="url(#globeGradient)" opacity="0.9"/>

  <!-- Globe Lines - Latitude -->
  <ellipse cx="100" cy="100" rx="55" ry="20" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <ellipse cx="100" cy="100" rx="55" ry="35" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Globe Lines - Longitude -->
  <ellipse cx="100" cy="100" rx="20" ry="55" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <ellipse cx="100" cy="100" rx="35" ry="55" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="45" x2="100" y2="155" stroke="white" stroke-width="2" opacity="0.6"/>

  <!-- Speech Bubble 1 (Top Right) -->
  <g transform="translate(130, 50)">
    <rect x="0" y="0" width="45" height="30" rx="15" fill="white" opacity="0.95"/>
    <polygon points="5,30 15,30 10,38" fill="white" opacity="0.95"/>
    <!-- Text dots -->
    <circle cx="12" cy="15" r="3" fill="#8B5CF6"/>
    <circle cx="22.5" cy="15" r="3" fill="#EC4899"/>
    <circle cx="33" cy="15" r="3" fill="#8B5CF6"/>
  </g>

  <!-- Speech Bubble 2 (Bottom Left) -->
  <g transform="translate(25, 120)">
    <rect x="0" y="0" width="45" height="30" rx="15" fill="white" opacity="0.95"/>
    <polygon points="35,0 25,0 30,-8" fill="white" opacity="0.95"/>
    <!-- Text dots -->
    <circle cx="12" cy="15" r="3" fill="#EC4899"/>
    <circle cx="22.5" cy="15" r="3" fill="#8B5CF6"/>
    <circle cx="33" cy="15" r="3" fill="#EC4899"/>
  </g>

  <!-- Sparkles -->
  <g opacity="0.8">
    <path d="M60 35 L62 40 L67 42 L62 44 L60 49 L58 44 L53 42 L58 40 Z" fill="white"/>
    <path d="M150 140 L151.5 143.5 L155 145 L151.5 146.5 L150 150 L148.5 146.5 L145 145 L148.5 143.5 Z" fill="white"/>
    <path d="M35 90 L36.5 93.5 L40 95 L36.5 96.5 L35 100 L33.5 96.5 L30 95 L33.5 93.5 Z" fill="white"/>
  </g>
</svg>
